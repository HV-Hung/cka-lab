apiVersion: v1
kind: Pod
metadata:
  name: pod-multi
  labels:
    app.kubernetes.io/name: pod-multi
    app.kubernetes.io/part-of: cka-lab
    app.kubernetes.io/managed-by: manual
spec:
  volumes:
  - name: shared-data
    emptyDir: {}
  containers:
  - name: sidecar
    image: busybox:1.36
    command: ["/bin/sh", "-c"]
    args: ["echo 'Hello from the sidecar!' > /var/log/sidecar/index.html && sleep 3600"]
    volumeMounts:
    - name: shared-data
      mountPath: /var/log/sidecar
  - name: nginx
    image: nginx:1.25
    ports:
    - containerPort: 80
    volumeMounts:
    - name: shared-data
      mountPath: /usr/share/nginx/html
